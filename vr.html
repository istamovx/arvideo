<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Ko'rish — ARVideo</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body { margin: 0; }
    .tap-hint {
      position: fixed; bottom: 70px; left: 0; right: 0; z-index: 10000;
      text-align: center; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.6);
      font-family: var(--font); font-size: 14px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="overlay-top">
    <a href="index.html">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Bosh sahifa
    </a>
    <span id="title">VR Ko'rish</span>
  </div>
  <div class="tap-hint" id="tapHint" style="display:none">Videoni boshlash uchun ekranga bosing</div>

  <script>
    // URL parametrlari:
    //   type — 360video | 360image | model  (default: model)
    //   src  — kontent URL'i
    //   scale — model o'lchami
    const params = new URLSearchParams(location.search);
    const type = (params.get('type') || 'model').toLowerCase();
    const src = params.get('src') ||
      (type === '360video'
        ? 'https://cdn.aframe.io/360-video-boilerplate/video/city.mp4'
        : type === '360image'
          ? 'https://cdn.aframe.io/360-image-gallery-boilerplate/img/sechelt.jpg'
          : 'https://cdn.aframe.io/test-models/models/glTF-2.0/virtualcity/VC.gltf');
    const scale = parseFloat(params.get('scale') || '1');

    const scene = document.createElement('a-scene');
    scene.setAttribute('renderer', 'colorManagement: true');

    const assets = document.createElement('a-assets');
    scene.appendChild(assets);

    if (type === '360video') {
      const video = document.createElement('video');
      video.id = 'vrVideo';
      video.src = src;
      video.setAttribute('crossorigin', 'anonymous');
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.loop = true;
      video.muted = true;
      assets.appendChild(video);

      const sky = document.createElement('a-videosphere');
      sky.setAttribute('src', '#vrVideo');
      scene.appendChild(sky);

      document.getElementById('tapHint').style.display = 'block';
      document.body.addEventListener('click', () => {
        video.muted = false;
        video.play().catch(() => {});
        document.getElementById('tapHint').style.display = 'none';
      }, { once: true });
      document.getElementById('title').textContent = '360° Video';
    } else if (type === '360image') {
      const sky = document.createElement('a-sky');
      sky.setAttribute('src', src);
      sky.setAttribute('crossorigin', 'anonymous');
      scene.appendChild(sky);
      document.getElementById('title').textContent = '360° Rasm';
    } else {
      const model = document.createElement('a-gltf-model');
      model.setAttribute('src', src);
      model.setAttribute('position', '0 0 -3');
      model.setAttribute('scale', `${scale} ${scale} ${scale}`);
      scene.appendChild(model);

      const sky = document.createElement('a-sky');
      sky.setAttribute('color', '#181D27');
      scene.appendChild(sky);

      const light1 = document.createElement('a-light');
      light1.setAttribute('type', 'ambient');
      light1.setAttribute('intensity', '0.8');
      scene.appendChild(light1);

      const light2 = document.createElement('a-light');
      light2.setAttribute('type', 'directional');
      light2.setAttribute('position', '1 2 1');
      scene.appendChild(light2);

      document.getElementById('title').textContent = '3D Model';
    }

    // Kamera + boshqaruv (telefonni aylantirish / sichqoncha bilan)
    const rig = document.createElement('a-entity');
    rig.setAttribute('position', '0 1.6 0');
    const camera = document.createElement('a-camera');
    camera.setAttribute('look-controls', 'reverseMouseDrag: false');
    camera.setAttribute('wasd-controls', 'enabled: true');
    rig.appendChild(camera);
    scene.appendChild(rig);

    document.body.appendChild(scene);
  </script>
</body>
</html>
