<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Skaner — ARVideo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body data-page="scan">

  <div class="page-header">
    <div>
      <h1>QR Skaner</h1>
      <p class="subtitle">QR kodni kameraga tuting — AR/VR tajriba avtomatik ochiladi.</p>
    </div>
  </div>

  <div class="scan-box">
    <div class="card" style="padding:16px">
      <div id="reader"></div>
      <p class="hint" id="scanStatus" style="margin-top:12px; text-align:center;">Kamera ishga tushmoqda…</p>
      <div id="confirmBox" style="display:none; margin-top:12px">
        <div class="alert alert-warning" style="margin-bottom:12px">
          <span>⚠️</span>
          <span>Bu QR <b>tashqi sayt</b>ga olib boradi. Ishonchli bo'lsangizgina oching:</span>
        </div>
        <p class="result-url" id="confirmUrl"></p>
        <div class="demo-row" style="margin-top:12px; justify-content:center">
          <button class="btn btn-primary" id="confirmOpen">Ochish</button>
          <button class="btn btn-secondary" id="confirmCancel">Bekor qilish</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/shell.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const statusEl = document.getElementById('scanStatus');
    const confirmBox = document.getElementById('confirmBox');
    const confirmUrl = document.getElementById('confirmUrl');
    let scanner = null;
    let handled = false;

    // Domen allowlist: bir xil origin har doim ishonchli (ARVideo QR'lari shu yerda).
    // Qo'shimcha ishonchli domenlarni shu ro'yxatga kiriting.
    const ALLOWED_HOSTS = [location.hostname];

    function goTo(href) {
      statusEl.textContent = '✅ Ochilmoqda…';
      confirmBox.style.display = 'none';
      if (scanner) scanner.stop().finally(() => { location.href = href; });
      else location.href = href;
    }

    function onScanSuccess(decodedText) {
      if (handled) return;
      handled = true;

      let url;
      try { url = new URL(decodedText, location.href); } catch { url = null; }

      // Faqat http(s) — javascript:, data:, file: va h.k. bloklanadi
      if (!url || (url.protocol !== 'https:' && url.protocol !== 'http:')) {
        statusEl.textContent = `QR mazmuni xavfsiz havola emas: "${decodedText}"`;
        handled = false;
        return;
      }

      if (ALLOWED_HOSTS.includes(url.hostname)) {
        // Ishonchli (bir xil origin) — to'g'ridan-to'g'ri ochamiz
        statusEl.textContent = '✅ QR topildi';
        goTo(url.href);
      } else {
        // Tashqi domen — foydalanuvchi tasdiqlashi kerak (fishing himoyasi)
        statusEl.textContent = 'QR topildi — tashqi havola tekshirilmoqda';
        confirmUrl.textContent = url.href;
        confirmBox.style.display = 'block';
        document.getElementById('confirmOpen').onclick = () => goTo(url.href);
        document.getElementById('confirmCancel').onclick = () => {
          confirmBox.style.display = 'none';
          statusEl.textContent = 'QR kodni ramka ichiga joylashtiring';
          handled = false;
        };
      }
    }

    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {} // har kadrda topilmasa — jim
    ).then(() => {
      statusEl.textContent = 'QR kodni ramka ichiga joylashtiring';
    }).catch((err) => {
      statusEl.textContent = '❌ Kamera ochilmadi: ' + err + '. HTTPS va kamera ruxsatini tekshiring.';
    });
  </script>
</body>
</html>
