<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Skaner — ARVideo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body data-page="scan">

  <div class="page-header">
    <div>
      <h1>QR Skaner</h1>
      <p class="subtitle">QR kodni kameraga tuting — AR/VR tajriba avtomatik ochiladi.</p>
    </div>
  </div>

  <div class="scan-box">
    <div class="card" style="padding:16px">
      <div id="reader"></div>
      <p class="hint" id="scanStatus" style="margin-top:12px; text-align:center;">Kamera ishga tushmoqda…</p>
    </div>
  </div>

  <script src="js/shell.js"></script>
  <script src="js/ui.js"></script>
  <script>
    const statusEl = document.getElementById('scanStatus');
    let scanner = null;
    let handled = false;

    function onScanSuccess(decodedText) {
      if (handled) return;
      handled = true;

      let url;
      try { url = new URL(decodedText); } catch { url = null; }

      if (url && (url.protocol === 'https:' || url.protocol === 'http:')) {
        statusEl.textContent = '✅ QR topildi, ochilmoqda…';
        scanner.stop().finally(() => { location.href = url.href; });
      } else {
        statusEl.textContent = `QR mazmuni havola emas: "${decodedText}"`;
        handled = false;
      }
    }

    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess,
      () => {} // har kadrda topilmasa — jim
    ).then(() => {
      statusEl.textContent = 'QR kodni ramka ichiga joylashtiring';
    }).catch((err) => {
      statusEl.textContent = '❌ Kamera ochilmadi: ' + err + '. HTTPS va kamera ruxsatini tekshiring.';
    });
  </script>
</body>
</html>
