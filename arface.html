<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Face AR — ARVideo</title>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="icon" href="favicon.svg" type="image/svg+xml" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2563eb" />
<link rel="stylesheet" href="css/style.css" />
<style>
html, body { margin: 0; overflow: hidden; background: var(--gray-900); }
.tap-hint {
position: fixed; bottom: 20px; left: 0; right: 0;
text-align: center; color: #fff; z-index: 10000;
text-shadow: 0 1px 4px rgba(0,0,0,.6); font-size: 14px;
font-family: var(--font); pointer-events: none;
}
</style>
</head>
<body>
<div class="overlay-top">
<a href="index.html">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
Bosh sahifa
</a>
<span id="status">Yuz qidirilmoqda…</span>
</div>

<div class="start-screen" id="startScreen">
<h1>Face AR</h1>
<p id="startInfo">Boshlash tugmasini bosing va old kamerangizni yuzingizga qarating.</p>
<button class="btn btn-primary btn-lg" id="startBtn">Kamerani yoqish</button>
<p class="hint">Kameraga ruxsat berishingiz so'raladi. HTTPS talab qilinadi.</p>
</div>

<div class="tap-hint" id="tapHint" style="display:none">Effekt yuzingizga moslanadi — sekin harakatlaning</div>

<script>
// URL parametrlari:
// type  — model | glasses | hat | mask  (effekt joylashuvi uchun preset)
// src   — 3D model URL'i (.glb / .gltf)
// scale — model o'lchami (default 1)
// anchor — yuz anchor indeksi: 168 (burun), 10 (peshona), 1 (yuz markazi)
const params = new URLSearchParams(location.search);
const DEFAULTS = {
  src: 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/glasses2/scene.gltf',
  scale: 1, anchor: 168
};
const type = (params.get('type') || 'glasses').toLowerCase();
const contentSrc = params.get('src') || DEFAULTS.src;
const scale = parseFloat(params.get('scale') || '1');

// Effekt presetlari: yuzning qaysi nuqtasiga va qanday joylashuv
const PRESETS = {
  glasses: { anchor: 168, position: '0 0 0', rotation: '0 0 0', baseScale: 0.5 },
  hat:     { anchor: 10,  position: '0 1.0 0', rotation: '0 0 0', baseScale: 0.7 },
  mask:    { anchor: 1,   position: '0 0 0', rotation: '0 0 0', baseScale: 1.0 },
  model:   { anchor: 1,   position: '0 0 0', rotation: '0 0 0', baseScale: 0.6 }
};
const preset = PRESETS[type] || PRESETS.glasses;
const anchorIndex = parseInt(params.get('anchor') || preset.anchor, 10);

function buildScene() {
  const scene = document.createElement('a-scene');
  scene.setAttribute('mindar-face', 'autoStart: false; uiLoading: yes; uiError: yes; uiScanning: no;');
  scene.setAttribute('color-space', 'sRGB');
  scene.setAttribute('embedded', '');
  scene.setAttribute('renderer', 'colorManagement: true; physicallyCorrectLights: true');
  scene.setAttribute('vr-mode-ui', 'enabled: false');
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false');

  const light = document.createElement('a-entity');
  light.setAttribute('light', 'type: ambient; intensity: 1');
  scene.appendChild(light);
  const dir = document.createElement('a-entity');
  dir.setAttribute('light', 'type: directional; intensity: 0.6; position: 1 1 1');
  scene.appendChild(dir);

  const camera = document.createElement('a-camera');
  camera.setAttribute('active', 'false');
  camera.setAttribute('position', '0 0 0');
  scene.appendChild(camera);

  const anchorEl = document.createElement('a-entity');
  anchorEl.setAttribute('mindar-face-target', 'anchorIndex: ' + anchorIndex);

  const s = (preset.baseScale * scale).toFixed(3);
  const model = document.createElement('a-gltf-model');
  model.setAttribute('src', contentSrc);
  model.setAttribute('position', preset.position);
  model.setAttribute('rotation', preset.rotation);
  model.setAttribute('scale', s + ' ' + s + ' ' + s);
  model.setAttribute('animation-mixer', '');
  anchorEl.appendChild(model);

  scene.appendChild(anchorEl);
  document.body.appendChild(scene);

  const status = document.getElementById('status');
  anchorEl.addEventListener('targetFound', () => { status.textContent = '✅ Yuz topildi'; });
  anchorEl.addEventListener('targetLost', () => { status.textContent = 'Yuz qidirilmoqda…'; });

  document.getElementById('tapHint').style.display = 'block';
  setTimeout(() => { document.getElementById('tapHint').style.display = 'none'; }, 4000);

  return scene;
}

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').style.display = 'none';
  const scene = buildScene();
  const start = () => {
    const sys = scene.systems['mindar-face-system'];
    if (sys) sys.start();
  };
  if (scene.hasLoaded) start();
  else scene.addEventListener('loaded', start, { once: true });
});

if (!params.get('src')) {
  document.getElementById('startInfo').innerHTML =
    'Demo rejim: namunaviy ko\'zoynak effekti yuzingizga moslanadi. O\'z modelingizni ulash uchun <code>?src=</code> parametridan foydalaning.';
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
